<!DOCTYPE html>
<html lang="es">
  <head>
    <link rel="icon" type="image/png" href="https://haceclick-ai.com/tu-logo-chico.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>HaceClick-ai | Salones</title>
    
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- ✅ CORRECCIÓN: Solo UMD, eliminado el importmap que generaba conflicto -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- ✅ @google/genai se importa como módulo solo donde se necesite, no globalmente -->

    <script>
      window.SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyn-fyPCd2OSTmcU7gvGeir4EQ8PgjyPWTv5ty4EZGX7FG6IITfYfKaRgYhWfDsBbHVOQ/exec";
      window.GOOGLE_API_KEY = "AIzaSyD41bVtLZbXXymo599fsQzaioVssfdxTq4";
      
      const urlParams = new URLSearchParams(window.location.search);
      window.INITIAL_VIEW = urlParams.get('view') || "admin";

      window.google = {
        script: {
          run: {
            withSuccessHandler: function(cb) { this.onSuccess = cb; return this; },
            withFailureHandler: function(cb) { this.onFailure = cb; return this; },
            
            _execute: function(action, params) {
              const success = this.onSuccess;
              const failure = this.onFailure;
              
              const payload = {
                action: action,
                params: params,
                auth: {
                  email: localStorage.getItem('adminEmail'),
                  token: localStorage.getItem('sessionToken')
                }
              };

              fetch(window.SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
              })
              .then(res => res.json())
              .then(data => { 
                if (action === 'authenticateUser' && data.success && data.token) {
                  localStorage.setItem('adminEmail', params[0]);
                  localStorage.setItem('sessionToken', data.token);
                }
                if (success) success(data); 
              })
              .catch(err => { 
                console.error("Error en " + action + ":", err);
                if (failure) failure(err); 
              });
            },
            
            // --- AUTENTICACIÓN ---
            authenticateUser: function(u, p) { this._execute('authenticateUser', [u, p]); },
            recoverPassword: function(email) { this._execute('recoverPassword', [email]); },
            updateUserPassword: function(email, newPass) { this._execute('updateUserPassword', [email, newPass]); },

            // --- DATOS GENERALES ---
            getAllData: function(email, specificId) { 
              if (specificId) localStorage.setItem('targetDbId', specificId);
              const idToUse = specificId || localStorage.getItem('targetDbId');
              // ✅ CORRECCIÓN: mandamos ambos parámetros que espera el backend
              this._execute('getAllData', [email, idToUse]); 
            },
            saveData: function(e, t, d) { 
              const specificId = localStorage.getItem('targetDbId');
              this._execute('saveData', [e, t, d, specificId]); 
            },
            deleteData: function(e, t, id) { this._execute('deleteData', [e, t, id]); },

            // --- SUPER ADMIN ---
            getAllTenants: function(adminEmail) { this._execute('getAllTenants', [adminEmail]); },
            createNewTenant: function(email, pass, name, rubro, adminEmail) { this._execute('createNewTenant', [email, pass, name, rubro, adminEmail]); },
            updateTenant: function(adminEmail, sheetId, name, pass) { this._execute('updateTenant', [adminEmail, sheetId, name, pass]); },
            deleteTenant: function(adminEmail, sheetId) { this._execute('deleteTenant', [adminEmail, sheetId]); },

            // ✅ CORRECCIÓN: getGlobalMessages ahora manda el email del admin
            getGlobalMessages: function(adminEmail) { this._execute('getGlobalMessages', [adminEmail]); },
            // ✅ CORRECCIÓN: saveGlobalMessagesList recibe la lista completa
            saveGlobalMessagesList: function(adminEmail, msgsArray) { this._execute('saveGlobalMessagesList', [adminEmail, msgsArray]); },

            // --- PROFESIONALES ---
            saveProfessionalWithUser: function(email, json) { this._execute('saveProfessionalWithUser', [email, json]); },
            deleteProfessionalAndUser: function(email, profId) { this._execute('deleteProfessionalAndUser', [email, profId]); },

            // --- ARCHIVOS / LOGOS ---
            uploadBrandLogo: function(e, d) { this._execute('uploadBrandLogo', [e, d]); },

            // --- SOPORTE ---
            sendSupportEmail: function(to, from, local, body) { this._execute('sendSupportEmail', [to, from, local, body]); },

            // --- PORTAL PÚBLICO ---
            getPublicData: function(alias) { this._execute('getPublicData', [alias]); },
            checkClientPublic: function(alias, phone) { this._execute('checkClientPublic', [alias, phone]); },
            // ✅ CORRECCIÓN: función que faltaba para registrar cliente nuevo
            savePublicClient: function(alias, clientJson) { this._execute('savePublicClient', [alias, clientJson]); },
            savePublicAppointment: function(alias, apptJson) { this._execute('savePublicAppointment', [alias, apptJson]); },

            // --- EXTRAS ---
            getShortUrl: function(longUrl) { this._execute('getShortUrl', [longUrl]); },
            getAdminStats: function() { this._execute('getAdminStats', []); },
          }
        }
      };

      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: { bg: '#f8fafc', card: '#ffffff', border: '#e2e8f0', text: '#1e293b', 'text-light': '#64748b' },
              primary: 'var(--color-primary)',
              'primary-dark': 'var(--color-primary-dark)',
              secondary: 'var(--color-secondary)'
            },
            borderRadius: { 'brand': '1rem' }
          }
        }
      }
    </script>
    
    <style>
      :root {
        --color-primary: #14b8a6;
        --color-primary-dark: #0f766e;
        --color-secondary: #9EC5FF;
        --color-accent: #F2C9D6;
        --color-bg: #F6F8FC;
        --color-border: #E2E6F0;
        --color-text: #2B2F3A;
      }
      * { -webkit-tap-highlight-color: transparent; }
      html, body, #root { margin: 0; padding: 0; height: 100%; overflow: hidden; width: 100%; }
      body { font-family: 'Inter', sans-serif; background-color: var(--color-bg); color: var(--color-text); }
      .animate-spin { animation: spin 1s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--color-bg); }
      ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--color-secondary); }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script src="js/Utils.js" type="text/babel"></script>
    <script src="js/AgentSimulator.js" type="text/babel"></script>
    <script src="js/PortalCliente.js" type="text/babel"></script>
    <script src="js/Dashboard.js" type="text/babel"></script>
    <script src="js/Agenda.js" type="text/babel"></script>
    <script src="js/Clientes.js" type="text/babel"></script>
    <script src="js/Profesionales.js" type="text/babel"></script>
    <script src="js/Servicios.js" type="text/babel"></script>
    <script src="js/Facturacion.js" type="text/babel"></script>
    <script src="js/Statistics.js" type="text/babel"></script>
    <script src="js/LocalSettings.js" type="text/babel"></script>
    <script src="js/AppCode.js" type="text/babel"></script>

    <script>
      setTimeout(function() { 
        if (window.lucide) window.lucide.createIcons(); 
      }, 1000);
    </script>
  </body>
</html>
